name: Build & Release Universal APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Universal & Per-ABI APKs
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Organize Output APKs
        run: |
          mkdir -p output_apks
          find android/app/build/outputs/apk/ -name "*.apk" -exec cp {} output_apks/ \;
          ls -la output_apks/

      - name: Create GitHub Release & Upload APKs
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: output_apks/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
          name: Orbit Smart Keyboard ${{ github.ref_name }}
          body: |
            ## 🚀 Orbit Smart Keyboard ${{ github.ref_name }} Pro Edition
            
            ### Package Contents:
            - **Universal APK** (`app-universal-debug.apk`): Universal build compatible with all ARM & x86 Android devices.
            - **ARM64 APK** (`app-arm64-v8a-debug.apk`): Optimized build for ARM 64-bit devices.
            
            ### Features & Updates:
            - **Orbit AI Engine**: Integrated smart assistant chat & voice dictation.
            - **Trackpad Cursor Control**: Drag horizontally on spacebar for smooth cursor positioning.
            - **Live Text Translation**: Multi-language real-time input translation.
            - **Selection Backspace**: Delete selected text blocks accurately.
