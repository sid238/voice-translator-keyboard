name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Release APKs
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: List APKs
        run: find android/app/build/outputs -name "*.apk" -ls

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: OrbitKeyboard-APKs
          path: android/app/build/outputs/apk/release/*-release.apk
          if-no-files-found: error

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: OrbitKeyboard-APKs
          path: apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Orbit Keyboard ${{ github.ref_name }}
          files: apk/*.apk
          body: |
            ## Orbit Keyboard ${{ github.ref_name }}

            ### Android APKs (per architecture — smaller size)
            - **arm64-v8a** — most modern phones (2017+)
            - **armeabi-v7a** — older phones (pre-2017)
            - **x86_64** — tablets & emulators
            - **universal** — all architectures combined (largest size)

            Pick the APK matching your device CPU.
