name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: false
        type: string

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Release APKs (all architectures)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: List APKs
        run: find android/app/build/outputs -name "*.apk" -ls

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: OrbitKeyboard-arm64-v8a
          path: android/app/build/outputs/apk/release/app-arm64-v8a-release.apk
          if-no-files-found: warn

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: OrbitKeyboard-armeabi-v7a
          path: android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk
          if-no-files-found: warn

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: OrbitKeyboard-x86_64
          path: android/app/build/outputs/apk/release/app-x86_64-release.apk
          if-no-files-found: warn

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: OrbitKeyboard-universal
          path: android/app/build/outputs/apk/release/app-universal-release.apk
          if-no-files-found: warn

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          path: apks

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apks/**/*.apk
          body: |
            ## Orbit Keyboard ${{ github.ref_name }}

            ### Android APKs
            - **arm64-v8a** — most modern phones (2017+)
            - **armeabi-v7a** — older phones (pre-2017)
            - **x86_64** — tablets & emulators
            - **universal** — all architectures (largest size)

            Pick the APK matching your device CPU.
